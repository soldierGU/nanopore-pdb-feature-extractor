project:
  name: nanopore-pdb-feature-extractor
  version: 0.1.0

input:
  pdb_id: 5JZT
  base_pdb_id: 5JZT
  nanopore_id: aerolysin_T232K
  structure_file: data/raw/T232K/5JZT_T232K_model.pdb
  file_format: pdb
  assembly_type: foldx_mutant

structure:
  model_index: 0
  expected_chains: ["A", "B", "C", "D", "E", "F", "G"]
  standard_residues_only: true
  ca_only: true

pore:
  axis: z
  center_method: xy_mean
  inner_radius_threshold: 20.0

mutation:
  is_mutant: true
  mutations:
    - original: T
      residue_number: 232
      mutant: K
      label: T232K
      chain_scope: all

profile:
  zbin_count: 20
  use_inner_only: true

dssp:
  executable: mkdssp
  ss8_unknown: C

output:
  processed_dir: data/processed
  residue_features_dir: data/processed/residue_features
  inner_residues_dir: data/processed/inner_residues
  logs_dir: outputs/logs
  pore_profiles_dir: data/processed/pore_profiles

